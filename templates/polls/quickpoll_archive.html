{% extends "base.html" %}

{% block content %}
  <a href="{% url 'polls:quickpoll_create' %}">New Quickpoll</a>
<h2>QuickPoll Archive</h2>
<ul>
    {% for poll in polls %}
        <li>
            <a href="{% url 'polls:quickpoll_detail' poll.external_id %}">{{ poll.question }}</a> 
            ({{ poll.ballot_count }} votes) - Finished: {{ poll.dead_line|date:"F j, Y, g:i a" }}
        </li>
    {% empty %}
        <li>No archived polls.</li>
    {% endfor %}
</ul>

{% endblock %}
