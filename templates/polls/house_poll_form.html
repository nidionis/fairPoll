{% extends "base.html" %}

{% block content %}
    <div class="form-container">
        <h1>{% trans "Create Poll" %}</h1>
        <p class="text-center">{{ house.name }}</p>

            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">{% trans "Create Poll" %}</button>
        </form>
    </div>
{% endblock %}
