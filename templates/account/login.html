{% extends "base.html" %}
{% load i18n %}
{% load account %}

{% block content %}
  <h1>{% trans "Log In" %}</h1>
  <form method="post" action="{% url 'account_login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Log In" %}</button>
  </form>
  <p class="text-center mt-4">Don't have an account? <a href="{% url 'account_signup' %}">Sign up here</a>.</p>
{% endblock %}
