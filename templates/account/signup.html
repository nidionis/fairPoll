{% extends "base.html" %}
{% load i18n %}
{% load account %}

{% block content %}
  <h1>{% trans "Sign Up" %}</h1>
  <form method="post" action="{% url 'account_signup' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Sign Up" %}</button>
  </form>
  <p>Already have an account? <a href="{% url 'two_factor:login' %}">Log in</a>.</p>
{% endblock %}
