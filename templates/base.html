<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FairPoll{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            | <a href="{% url 'about' %}">How to</a>
            |
            <form action="{% url 'polls:quickpoll_join' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <input type="text" name="poll_id" placeholder="Enter Poll ID" required>
                <button type="submit">Join Poll</button>
            </form>
            {% if user.is_authenticated %}
                | <a href="{% url 'users:account' %}">Account</a>
            {% else %}
                | <a href="{% url 'two_factor:login' %}">Login</a>
                | <a href="{% url 'account_signup' %}">Sign Up</a>
            {% endif %}

        </nav>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message{% if message.tags %} {{ message.tags }}{% endif %}">
                        {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
