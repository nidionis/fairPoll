<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FairPoll{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'users:user_homepage' %}">Home</a>
            {% if user.is_authenticated %}
                | <a href="{% url 'users:account' %}">Account</a>
            {% else %}
                | <a href="{% url 'two_factor:login' %}">Login</a>
                | <a href="{% url 'account_signup' %}">Sign Up</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message{% if message.tags %} {{ message.tags }}{% endif %}">
                        {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
