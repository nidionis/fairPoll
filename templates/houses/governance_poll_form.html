{% extends "base.html" %}
{% load i18n %}

{% block content %}
    <div class="form-container">
        <h1>Start {{ type }} Poll</h1>
        <p class="text-center">{{ house.name }}</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Start Poll</button>
        </form>
    </div>
{% endblock %}
