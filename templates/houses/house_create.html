{% extends "base.html" %}

{% block extra_head %}
    {{ form.media.css }}
{% endblock %}

{% block content %}
    <div class="form-container">
        <h1>Create a House</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Create House</button>
        </form>
    </div>
{% endblock %}

{% block extra_js %}
    {{ form.media.js }}
{% endblock %}
