{% extends "base.html" %}
{% load i18n %}

{% block extra_head %}
    {{ form.media.css }}
{% endblock %}

{% block content %}
    <div class="form-container">
        <h1>{% trans "Create a House" %}</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">{% trans "Create House" %}</button>
        </form>
    </div>
{% endblock %}

{% block extra_js %}
    {{ form.media.js }}
{% endblock %}
