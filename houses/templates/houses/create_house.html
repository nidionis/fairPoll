{% extends "base.html" %}

{% block content %}
  <h1>Create a house</h1>

  <form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <div>
      <label for="{{ form.name.id_for_label }}">Name</label><br>
      {{ form.name }}
      {{ form.name.errors }}
    </div>

    <div style="margin-top: 1rem;">
      <label for="{{ form.members.id_for_label }}">Users to integrate</label><br>
      {{ form.members }}
      {{ form.members.errors }}
      {% if form.members.help_text %}
        <p><small>{{ form.members.help_text }}</small></p>
      {% endif %}
    </div>

    <div style="margin-top: 1rem;">
      <button type="submit">Create</button>
      <a href="{% url 'houses:houses_homepage' %}">Cancel</a>
    </div>
  </form>
{% endblock %}
