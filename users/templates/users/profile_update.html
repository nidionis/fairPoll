{% extends "base.html" %}

{% block title %}Update Profile{% endblock %}

{% block content %}
  <h1>Update Profile</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
  </form>

  <p><a href="{% url 'users:account' %}">Back to Account</a></p>
{% endblock %}
