{% extends "base.html" %}

{% block title %}{% trans "Update Profile" %}{% endblock %}

{% block content %}
  <h1>{% trans "Update Profile" %}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% trans "Save Changes" %}</button>
  </form>

  <p><a href="{% url 'users:account' %}">{% trans "Back to Account" %}</a></p>
{% endblock %}
