upstream django_app {
    server web:8000;
}

# Redirection du trafic HTTP (port 80) vers HTTPS (port 443)
server {
    listen 80;
    server_name fairpoll.org www.fairpoll.org;
    return 301 https://$host$request_uri;
}

# Configuration HTTPS
server {
    listen 443 ssl;
    server_name fairpoll.org www.fairpoll.org;

    # Chemins vers votre certificat Infomaniak
    ssl_certificate /etc/ssl/fairpoll/fairpoll.crt;
    ssl_certificate_key /etc/ssl/fairpoll/fairpoll.key;

    # Configurations SSL recommandées (pour la sécurité)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # Transfert vers Gunicorn/Django via Docker Compose
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Très important pour que Django sache qu'il est derrière du HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuration pour servir vos fichiers statiques (optionnel mais recommandé)
    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}
